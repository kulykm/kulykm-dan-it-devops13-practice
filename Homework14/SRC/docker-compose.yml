version: "3.9"

services:
  app:
    build: ../../Homework13/SRC
    container_name: hw14-app
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: hw14-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
